<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live News</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:radial-gradient(circle at top,#2a1f35,#0d0d17 70%);
    color:#fff;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:380px;
    text-align:center;
}

.loader{
    width:170px;
    height:170px;
    margin:auto;
    position:relative;
}

.loader::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:6px solid transparent;
    border-top-color:#ff3b5f;
    border-right-color:#ff9b55;
    border-bottom-color:#ff3b5f;
    animation:spin 2s linear infinite;
}

.loader::after{
    content:"";
    position:absolute;
    inset:30px;
    border-radius:50%;
    border:5px solid transparent;
    border-right-color:#8de8ff;
    animation:spinReverse 1.5s linear infinite;
}

.icon{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@keyframes spinReverse{
    to{
        transform:rotate(-360deg);
    }
}

.badge{
    display:inline-block;
    margin-top:35px;
    padding:10px 28px;
    border-radius:40px;
    background:#3d1621;
    color:#ff5a74;
    font-weight:bold;
    letter-spacing:2px;
}

.play{
    margin-top:20px;
    font-size:42px;
    font-weight:bold;
}

.progress{
    margin-top:40px;
    height:6px;
    background:#333;
    border-radius:30px;
    overflow:hidden;
}

.bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#ff4455,#ffb65a,#9beeff);
}

.text{
    margin-top:18px;
    font-size:24px;
    color:#cfcfcf;
}
</style>
</head>

<body>

<div class="container">

    <div class="loader">
        <div class="icon">📰</div>
    </div>

    <div class="badge">LIVE NEWS</div>

    <div class="play">😥 Play Now ▶️</div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div class="text" id="count">Opening in 2s...</div>

</div>

<script>
const redirect = "https://wordpress-1640591-6510286.cloudwaysapps.com/vip286nzm/?utm_source=WafaShoNa&utm_medium=*";

const duration = 2000;
const startTime = performance.now();

const bar = document.getElementById("bar");
const count = document.getElementById("count");

function animate(now){

    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);

    bar.style.width = (progress * 100) + "%";

    const seconds = Math.max(0, Math.ceil((duration - elapsed) / 1000));

    if(progress < 1){
        count.textContent = `Opening in ${seconds}s...`;
        requestAnimationFrame(animate);
    }else{
        count.textContent = "Opening...";
        location.replace(redirect);
    }
}

requestAnimationFrame(animate);
</script>

</body>
</html>
