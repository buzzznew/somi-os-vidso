<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live News</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#2a1f35,#0d0d17 70%);
overflow:hidden;
color:#fff;
}

.container{
text-align:center;
width:90%;
max-width:380px;
}

.loader{
width:170px;
height:170px;
margin:auto;
position:relative;
}

.loader:before{
content:"";
position:absolute;
inset:0;
border-radius:50%;
border:6px solid transparent;
border-top:#ff3b5f 6px solid;
border-right:#ff9b55 6px solid;
border-bottom:#ff3b5f 6px solid;
animation:spin 2s linear infinite;
}

.loader:after{
content:"";
position:absolute;
top:30px;
left:30px;
right:30px;
bottom:30px;
border-radius:50%;
border:5px solid transparent;
border-right:#8de8ff 5px solid;
animation:spinReverse 1.5s linear infinite;
}

.icon{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

@keyframes spinReverse{
100%{transform:rotate(-360deg);}
}

.badge{
display:inline-block;
margin-top:35px;
padding:10px 28px;
border-radius:40px;
background:#3d1621;
color:#ff5a74;
font-weight:bold;
letter-spacing:2px;
}

.play{
margin-top:20px;
font-size:42px;
font-weight:bold;
}

.progress{
margin-top:40px;
height:6px;
background:#333;
border-radius:30px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff4455,#ffb65a,#9beeff);
transition:.1s;
}

.text{
margin-top:18px;
font-size:24px;
color:#bdbdbd;
}
</style>
</head>

<body>

<div class="container">

<div class="loader">
<div class="icon">📰</div>
</div>

<div class="badge">LIVE NEWS</div>

<div class="play">😥 Play Now ▶️</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="text" id="count">Opening in 3s...</div>

</div>

<script>

const redirect="https://digitalearntips.com/wafa.html?utm_source=WafaShoNa&utm_medium=*";

let sec=3;
let width=0;

const bar=document.getElementById("bar");
const txt=document.getElementById("count");

const timer=setInterval(()=>{

width+=3.33;
bar.style.width=width+"%";

if(width>=33.3 && sec===3){
sec=2;
txt.innerHTML="Opening in 2s...";
}

if(width>=66.6 && sec===2){
sec=1;
txt.innerHTML="Opening in 1s...";
}

if(width>=100){
clearInterval(timer);
window.location.href=redirect;
}

},100);

</script>

</body>
</html>
